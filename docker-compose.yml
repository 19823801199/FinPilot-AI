# FinPilot AI - Docker Compose
# One-command startup for full stack development

version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: finpilot-api
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=FinPilot AI
      - APP_VERSION=1.0.0
      - DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///data/finpilot.db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key-change-in-production}
    volumes:
      - api-data:/app/data
    networks:
      - finpilot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: finpilot-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_APP_NAME=FinPilot AI
      - NEXT_PUBLIC_APP_VERSION=1.0.0
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - finpilot-network
    restart: unless-stopped

volumes:
  api-data:
    driver: local

networks:
  finpilot-network:
    driver: bridge
