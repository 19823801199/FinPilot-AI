<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8fafc"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">FinPilot AI 系统架构</text>
  
  <!-- Frontend -->
  <rect x="50" y="60" width="200" height="120" rx="8" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Frontend</text>
  <text x="150" y="105" text-anchor="middle" font-size="11" fill="#64748b">Next.js 15 + React 18</text>
  <text x="150" y="120" text-anchor="middle" font-size="11" fill="#64748b">TailwindCSS + Shadcn UI</text>
  <text x="150" y="135" text-anchor="middle" font-size="11" fill="#64748b">Zustand + TanStack Query</text>
  <text x="150" y="155" text-anchor="middle" font-size="11" fill="#64748b">Axios + Recharts</text>
  
  <!-- Backend -->
  <rect x="300" y="60" width="200" height="120" rx="8" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Backend</text>
  <text x="400" y="105" text-anchor="middle" font-size="11" fill="#64748b">FastAPI + Python 3.12</text>
  <text x="400" y="120" text-anchor="middle" font-size="11" fill="#64748b">SQLAlchemy 2.x + Alembic</text>
  <text x="400" y="135" text-anchor="middle" font-size="11" fill="#64748b">Pydantic v2 + Uvicorn</text>
  <text x="400" y="155" text-anchor="middle" font-size="11" fill="#64748b">JWT + CORS</text>
  
  <!-- AI Services -->
  <rect x="550" y="60" width="200" height="120" rx="8" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="2"/>
  <text x="650" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">AI Services</text>
  <text x="650" y="105" text-anchor="middle" font-size="11" fill="#64748b">DeepSeek API (LLM)</text>
  <text x="650" y="120" text-anchor="middle" font-size="11" fill="#64748b">AKShare (股票数据)</text>
  <text x="650" y="135" text-anchor="middle" font-size="11" fill="#64748b">ChromaDB (向量检索)</text>
  <text x="650" y="155" text-anchor="middle" font-size="11" fill="#64748b">SQLite / PostgreSQL</text>
  
  <!-- Arrows -->
  <line x1="250" y1="120" x2="300" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="120" x2="550" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Modules -->
  <rect x="50" y="220" width="130" height="80" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
  <text x="115" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">工作台</text>
  <text x="115" y="265" text-anchor="middle" font-size="10" fill="#64748b">AI 对话</text>
  <text x="115" y="280" text-anchor="middle" font-size="10" fill="#64748b">会话管理</text>
  
  <rect x="200" y="220" width="130" height="80" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
  <text x="265" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">学习中心</text>
  <text x="265" y="265" text-anchor="middle" font-size="10" fill="#64748b">课程学习</text>
  <text x="265" y="280" text-anchor="middle" font-size="10" fill="#64748b">考试辅导</text>
  
  <rect x="350" y="220" width="130" height="80" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
  <text x="415" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">股票研究员</text>
  <text x="415" y="265" text-anchor="middle" font-size="10" fill="#64748b">股票搜索</text>
  <text x="415" y="280" text-anchor="middle" font-size="10" fill="#64748b">AI 分析</text>
  
  <rect x="500" y="220" width="130" height="80" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
  <text x="565" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">知识库</text>
  <text x="565" y="265" text-anchor="middle" font-size="10" fill="#64748b">文档上传</text>
  <text x="565" y="280" text-anchor="middle" font-size="10" fill="#64748b">RAG 检索</text>
  
  <rect x="650" y="220" width="130" height="80" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Agent 系统</text>
  <text x="715" y="265" text-anchor="middle" font-size="10" fill="#64748b">多专家协作</text>
  <text x="715" y="280" text-anchor="middle" font-size="10" fill="#64748b">任务调度</text>
  
  <!-- Data Flow -->
  <text x="400" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">数据流</text>
  
  <rect x="100" y="360" width="600" height="100" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="385" text-anchor="middle" font-size="12" fill="#1e293b">用户请求 → Frontend → Backend API → AI/数据服务 → 返回结果</text>
  
  <circle cx="150" cy="415" r="20" fill="#3b82f6" opacity="0.2"/>
  <text x="150" y="420" text-anchor="middle" font-size="10" fill="#1e293b">用户</text>
  
  <circle cx="300" cy="415" r="20" fill="#10b981" opacity="0.2"/>
  <text x="300" y="420" text-anchor="middle" font-size="10" fill="#1e293b">API</text>
  
  <circle cx="450" cy="415" r="20" fill="#8b5cf6" opacity="0.2"/>
  <text x="450" y="420" text-anchor="middle" font-size="10" fill="#1e293b">LLM</text>
  
  <circle cx="600" cy="415" r="20" fill="#f59e0b" opacity="0.2"/>
  <text x="600" y="420" text-anchor="middle" font-size="10" fill="#1e293b">数据</text>
  
  <line x1="170" y1="415" x2="280" y2="415" stroke="#94a3b8" stroke-width="2"/>
  <line x1="320" y1="415" x2="430" y2="415" stroke="#94a3b8" stroke-width="2"/>
  <line x1="470" y1="415" x2="580" y2="415" stroke="#94a3b8" stroke-width="2"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>